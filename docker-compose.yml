services:
  claude:
    build: 
      context: ./build_files
      dockerfile: Dockerfile
    container_name: claude-dev
    user: dev
    stdin_open: true
    tty: true
    working_dir: /workspace
    networks: [devnet]
    volumes:
      - asdf_data:/home/dev/.asdf
      - ./.claudinho:/home/dev/.claudinho
      - claude_data:/home/dev/.claude
      - ./workspace:/workspace
volumes:
  asdf_data:
  claude_data:
    external: true
networks:
  devnet:
    driver: bridge